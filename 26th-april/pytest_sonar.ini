[pytest]
# Pytest Configuration for SonarQube Project

# ============================================================================
# TEST DISCOVERY
# ============================================================================

# Minimum pytest version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# ============================================================================
# OUTPUT OPTIONS
# ============================================================================

# Default command line options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes

# Console output style
console_output_style = progress

# ============================================================================
# MARKERS
# ============================================================================

# Custom markers for test organization
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    fast: marks tests as fast
    unit: marks tests as unit tests
    integration: marks tests as integration tests
    smoke: marks tests as smoke tests
    validation: marks tests related to validation
    database: marks tests that use database
    api: marks tests for API functionality
    security: marks security-related tests
    regression: marks regression tests

# ============================================================================
# TEST PATHS
# ============================================================================

# Paths to search for tests
testpaths = .

# Minimum Python version
minversion = 7.0

# ============================================================================
# COVERAGE OPTIONS (if using pytest-cov)
# ============================================================================

# Coverage configuration
# Note: Run with: pytest --cov=user_manager --cov-report=xml

# Exclude patterns from coverage
norecursedirs = 
    .git
    venv
    .venv
    __pycache__
    *.egg-info
    .pytest_cache
    .tox
    env
    build
    dist

# ============================================================================
# TIMEOUT SETTINGS (requires pytest-timeout)
# ============================================================================

# Global timeout for all tests (in seconds)
timeout = 300

# Timeout per test (optional)
# timeout_method = thread

# ============================================================================
# LOGGING
# ============================================================================

# Log level
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# File logging
log_file = pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# ============================================================================
# ASSERTION SETTINGS
# ============================================================================

# Assertion options
# Disable assert rewriting for performance (rarely needed)
# python_functions = test_

# ============================================================================
# FLAKY TEST HANDLING
# ============================================================================

# For flaky tests (optional, requires pytest-rerunfailures)
# --reruns 1 --reruns-delay 1

# ============================================================================
# PARALLEL EXECUTION (optional, requires pytest-xdist)
# ============================================================================

# For running tests in parallel:
# -n auto  (uses number of CPUs)
# -n 4     (uses 4 workers)

# ============================================================================
# BENCHMARKING (optional, requires pytest-benchmark)
# ============================================================================

# Benchmark options (optional)
# --benchmark-disable to skip benchmarks

# ============================================================================
# CUSTOM SETTINGS
# ============================================================================

# Project specific settings
# These can be accessed in tests via pytest.config.getini()

# ============================================================================
# HINTS FOR RUNNING TESTS
# ============================================================================

# Run all tests:
#   pytest
#
# Run with verbose output:
#   pytest -v
#
# Run with coverage:
#   pytest --cov=user_manager --cov-report=html --cov-report=xml
#
# Run specific test file:
#   pytest test_user_manager.py
#
# Run specific test class:
#   pytest test_user_manager.py::TestUserCreation
#
# Run specific test:
#   pytest test_user_manager.py::TestUserCreation::test_user_creation_success
#
# Run tests matching pattern:
#   pytest -k "validation"
#
# Run tests by marker:
#   pytest -m "unit"
#
# Skip slow tests:
#   pytest -m "not slow"
#
# Stop at first failure:
#   pytest -x
#
# Run failed tests first:
#   pytest --ff
#
# Run with output capture disabled (see print statements):
#   pytest -s
#
# Run in parallel (requires pytest-xdist):
#   pytest -n auto
#
# Generate HTML report:
#   pytest --html=report.html
#
# Generate JUnit XML report:
#   pytest --junit-xml=test-results.xml
