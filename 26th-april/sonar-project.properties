# sonar-project.properties
# SonarQube Configuration for Python Project

# ============================================================================
# PROJECT IDENTIFICATION
# ============================================================================

# Unique identifier for the project
sonar.projectKey=python_user_management_app

# Display name of the project
sonar.projectName=Python User Management System

# Project version
sonar.projectVersion=1.0.0

# ============================================================================
# SOURCE CODE CONFIGURATION
# ============================================================================

# Root directory for sources
sonar.sources=.

# Programming language
sonar.language=py

# Source file inclusions
sonar.inclusions=*.py,src/**/*.py

# Files to exclude from analysis
sonar.exclusions=\
    **/*_test.py,\
    **/test_*.py,\
    **/tests/**,\
    venv/**,\
    .venv/**,\
    __pycache__/**,\
    *.egg-info/**,\
    .pytest_cache/**,\
    .tox/**,\
    build/**,\
    dist/**

# ============================================================================
# TEST CONFIGURATION
# ============================================================================

# Test inclusion patterns
sonar.tests=.
sonar.test.inclusions=**/test_*.py,**/*_test.py,**/tests/**

# Source files to test
sonar.test.sources=user_manager.py

# ============================================================================
# CODE COVERAGE CONFIGURATION
# ============================================================================

# Coverage report file path
sonar.python.coverage.reportPaths=coverage.xml

# Unit test report path
sonar.python.xunit.reportPath=test-results.xml

# Directories to exclude from coverage
sonar.coverage.exclusions=\
    **/tests/**,\
    **/*_test.py,\
    **/test_*.py,\
    venv/**,\
    .venv/**

# ============================================================================
# QUALITY GATE CONFIGURATION
# ============================================================================

# Wait for quality gate to be evaluated
sonar.qualitygate.wait=true

# Quality gate name (optional)
# sonar.qualitygate.name=Sonar Way

# ============================================================================
# PYLINT CONFIGURATION
# ============================================================================

# Pylint report path
sonar.python.pylint.reportPath=pylint-report.txt

# ============================================================================
# BANDIT CONFIGURATION (Security)
# ============================================================================

# Bandit report path (security analysis)
sonar.python.bandit.reportPath=bandit-report.json

# ============================================================================
# FLAKE8 CONFIGURATION
# ============================================================================

# Flake8 report path
sonar.python.flake8.reportPath=flake8-report.txt

# ============================================================================
# SERVER CONFIGURATION
# ============================================================================

# SonarQube server URL
sonar.host.url=http://localhost:9000

# Authentication token (use environment variable in CI/CD)
# sonar.login=${SONAR_TOKEN}

# ============================================================================
# ADVANCED OPTIONS
# ============================================================================

# Encoding of source files
sonar.sourceEncoding=UTF-8

# Show duplicate blocks
sonar.cpd.python.minimum_tokens=30

# Issue resolution
sonar.issue.resolution.oldestAllowed=30

# Maximum number of issues to process
sonar.max.issues=100000

# ============================================================================
# PYTHON SPECIFIC SETTINGS
# ============================================================================

# Python version (3.9 in our case)
sonar.python.version=3.9

# Type checking
sonar.python.typecheck=true

# ============================================================================
# REPORTING
# ============================================================================

# Report verbose output
sonar.verbose=false

# Log level
# sonar.log.level=DEBUG
